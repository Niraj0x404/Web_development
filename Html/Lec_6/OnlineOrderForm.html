<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=\, initial-scale=1.0">
    <title>Pizza Delivery</title>
</head>
<body>
    <div>
        <form>
            <h1 style="text-align: center;">Pete's Pizza Delivery</h1>
            <br>
            <h2 style="text-align: center;">Online Order Form</h2>
            <br>
            <h3 style="text-align: center;">*Required fields</h3>
            <br>
            <fieldset>
                <legend>Customer details</legend>
                <table>
                    <tr>
                        <td>
                            <label for="name">*Name:</label>
                        </td>
                        <td>
                            <input type="text" id="name" name="name" required>
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <label for="address">*Address:</label>
                        </td>
                        <td>
                            <input type="text" id="address" name="address" required>
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <label for="city">*Town/city:</label>
                        </td>
                        <td>
                            <input type="text" id="city" name="city" required>
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <label for="postcode">*Postcode:</label>
                        </td>
                        <td>
                            <input type="number" id="postcode" name="postcode" required>
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <label for="tel">*Tel:</label>
                        </td>
                        <td>
                            <input type="tel" id="tel" name="tel" required>
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <label for="email">*Email:</label>
                        </td>
                        <td>
                            <input type="email" id="email" name="email" required>
                        </td>
                    </tr>
                </table>
            </fieldset>

<br><br>
            <table>
                <tr>
                    <td>
                        <fieldset>
                            <legend>Topping *</legend>
                        <input type="radio" id="margherita" name="Size">
                        <label for="margherita">Margherita</label>
                        <br>
                        <input type="radio" id="fourseason" name="Size">
                        <label for="fourseason">Four season</label>
                        <br>
                        <input type="radio" id="mealfest" name="Size">
                        <label for="mealfest">Meat Feast</label>
                        </fieldset>
                        </td>
                        <td>
                            <fieldset>
                                <legend>Size *</legend>
                        <input type="radio" id="small" name="Size">
                        <label for="small">Small</label>
                        <br>
                        <input type="radio" id="medium" name="Size">
                        <label for="medium">Medium</label>
                        <br>
                        <input type="radio" id="large" name="Size">
                        <label for="large">Large</label>
                        </fieldset>
                        </td>
                        <td>
                            <fieldset>
                                <legend>Extras </legend>
                        <input type="checkbox" id="mushrooms" name="mushrooms">
                        <label for="mushrooms">Mushroooms</label>
                        <br>
                        <input type="checkbox" id="greenpeppers" name="reenpeppers">
                        <label for="reenpeppers">Green peppers</label>
                        <br>
                        <input type="checkbox" id="anchovies" name="anchovies">
                        <label for="anchovies">Anchovies</label>
                        <br>
                        <input type="checkbox" id="extracheese" name="extracheese">
                        <label for="extracheese">Extracheese</label>
                        </fieldset>
                    </td>
                </tr>
            </table>
            <br><br><br>
            <fieldset>
                <legend>Delivery</legend>
                <label for="time">Preffered delivry time</label>
                <input type="time" id="time" name="time">
                <br><br>
                <label for="instruction">Delivery Instructions:</label>
                <br>
                <br>
                <textarea id="instruction" name="instruction" rows="5" cols="90"></textarea>
            </fieldset>
        </form>
    </div>
</body>
</html>
