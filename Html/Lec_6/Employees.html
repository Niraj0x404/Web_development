<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Details</title>
</head>
<body>
<div>
    <form>
        <fieldset>
            <legend> <b>Employee Details</b></legend>
            <label for="First Name">First Name: </label>
            <input type="text" id="First Name"   name="First Name" placeholder="First Name" required>
            <br><br>
            <label for="Last Name"> Last Name:</label>
            <input type="text" name="Last Name" id="Last Name" placeholder="Last Name" required>
            <br><br>
            <input type="radio" id="Male" name="Gender">
            <label for="Male"> Male</label>
            <input type="radio" id="Female" name="Gender">
            <label for="Female">Female</label>
            <br><br>
            <label for="Employeeid">Employee ID: </label>
            <input type="text" id="Employeeid" name="Employeeid" placeholder="Employee id" required>
            <br><br>
            <label for="Designation"> Designation :</label>
            <input type="text" id="Designation" name="Designation" placeholder="Designation" required > 
            <br><br>
            <label for="Phone Number">Phone Number :</label>
            <input type="tel" name="Phone Number" id="Phone Number" placeholder="Phone Number" required>
            <br><br>
            <input type="submit" value="Submit">
            <br>    
        </fieldset>
    </form>
</div>
</body>
</html>
