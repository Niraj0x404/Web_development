<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div>
        <h1>Forms</h1>
        <form action="welcomepage.html" target="_blank">
            <fieldset>
                <legend>Here is your form</legend>
            





            <label for="fullname">Full Name :</label>
            <input type="text" id="fullname" placeholder="Enter Your Name" required>
            <br><br>
            <label for="email">Email :</label>
            <input type="email" id="email" placeholder="Enter you email" required>
            <br><br>
            <label for="password">Password :</label>
            <input type="password" id="password" placeholder="Enter Your Password" required>
            <br><br>
            <label for="checkbox">Are you 18+ ?</label>
            <input type="checkbox" id="checkbox" required >
            <br><Br>
            <label for="phonenumber">Enter your phone number :</label>  
            <input type="number" id="phonenumber" required >
            <br><br>
            <label for="gender">Gender :</label>
            <label for="male">Male</label>
            <input type="radio" id="male" name="gender">
            <label for="Female">Female </label>
            <input type="radio" id="Female" name="gender">
            <br><br>
            <label for="file">Upload Photo</label>
            <input type="file" id="file" required>
            <br><br>
            <label for="dob">Date of Birth :</label>
            <input type="date" id="dob" required>
            <br><br>
            <label for="city">Select Your Disctrict</label>
            <select name="city" id="city">
                <option value="Ranchi">Ranchi</option>
                <option value="Deoghar" selected>Deoghar</option>
                <option value="Dhanbad">Dhanbad</option>
                <option value="Bokaro">Bokaro</option>
            </select>
            <br><br>
            <label for="comment" >Comment</label>
            <textarea name="" id="comment" cols="10" rows="5"></textarea>
            <button type="submit"> Submit Form</button>
        </form>
        </fieldset>
    </div>
</body>
</html>
